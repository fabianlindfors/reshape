name: Publish Docker image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (without 'v' prefix)"
        required: true
        type: string

jobs:
  build-docker:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_ACCESS_TOKEN }}
        run: |
          docker login -u ${{ secrets.DOCKER_USER }} -p $DOCKER_PASSWORD
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ secrets.DOCKER_USER }}/reshape,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-manifest:
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_ACCESS_TOKEN }}
        run: |
          docker login -u ${{ secrets.DOCKER_USER }} -p $DOCKER_PASSWORD
      - name: Create and push multi-arch image
        working-directory: ${{ runner.temp }}/digests
        run: |
          docker buildx imagetools create \
            --tag ${{ secrets.DOCKER_USER }}/reshape:${{ inputs.version }} \
            --tag ${{ secrets.DOCKER_USER }}/reshape:latest \
            $(printf '${{ secrets.DOCKER_USER }}/reshape@sha256:%s ' *)
